<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Baryp-Kel Airlines</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
  <a href="index.html" class="logo">
    <img src="image/logo.jpeg" alt="Baryp-Kel Logo"> 
  </a>

  <div class="nav-right">
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html" class="active">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <a href="login.html" class="btn-header">Login</a>
  </div>
</header>

  <section class="register-section">
    <div class="register-box">
      <h1>Create Account</h1>
      <form>
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="Your Name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat password" required>

        <button type="submit">Register</button>
      </form>
      <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </section>


  <footer>
    <p>&copy; 2025 Baryp-Kel Airlines | Danial & Nurgaly</p>
  </footer>

</body>
</html>
