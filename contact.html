        </ul>

    </div>

  <section class="contact-section py-5">
  <div class="container" style="max-width: 500px;">

    <h1 class="mb-4" style="color:#002366;">Contact Us</h1>
    <p class="lead mb-4">Have questions, suggestions, or need assistance? Our team is always ready to help you. Fill out the form below, and we will get back to you as soon as possible.</p>

    <!-- Форма для отправки сообщения -->
    <form class="contact-form row g-3 justify-content-center" method="POST">
      <div class="col-12 col-md-6">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" id="name" name="name" class="form-control" placeholder="Your Name" required>
      </div>

      <div class="col-12 col-md-6">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="col-12">
        <label for="message" class="form-label">Message</label>
        <textarea id="message" name="message" class="form-control" rows="5" placeholder="Your message..." required></textarea>
      </div>

      <div class="col-12">
        <button type="submit" class="btn btn-primary">Send Message</button>
      </div>
    </form>
  </div>
</section>
